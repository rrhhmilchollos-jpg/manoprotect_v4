name: ManoProtect Apps CI/CD

on:
  push:
    branches: [main, develop]
    tags: ['v*']
    paths:
      - 'apps/**'
  pull_request:
    branches: [main]
    paths:
      - 'apps/**'
  workflow_dispatch:
    inputs:
      app_name:
        description: 'App to build (comerciales/instaladores/admin/all)'
        required: true
        default: 'all'
      track:
        description: 'Play Store track (internal/beta/production)'
        required: true
        default: 'internal'

env:
  JAVA_VERSION: '17'
  API_BASE_URL: https://www.manoprotect.com/api

jobs:
  # ============================================
  # STEP 1: Validate & Test
  # ============================================
  validate:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        app: [comerciales, instaladores, admin]
    steps:
      - uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: ${{ env.JAVA_VERSION }}

      - name: Validate google-services.json
        run: |
          APP_DIR="apps/${{ matrix.app }}"
          if [ ! -f "$APP_DIR/google-services.json" ]; then
            echo "::error::google-services.json not found for ${{ matrix.app }}"
            exit 1
          fi
          python3 -c "import json; json.load(open('$APP_DIR/google-services.json'))" || {
            echo "::error::Invalid google-services.json for ${{ matrix.app }}"
            exit 1
          }
          echo "google-services.json OK for ${{ matrix.app }}"

      - name: Validate build.gradle
        run: |
          if [ ! -f "apps/${{ matrix.app }}/build.gradle" ]; then
            echo "::error::build.gradle not found for ${{ matrix.app }}"
            exit 1
          fi
          echo "build.gradle OK for ${{ matrix.app }}"

      - name: Check version
        run: |
          VERSION_FILE="apps/${{ matrix.app }}/version.properties"
          if [ -f "$VERSION_FILE" ]; then
            cat "$VERSION_FILE"
          else
            echo "VERSION_CODE=1" > "$VERSION_FILE"
            echo "VERSION_NAME=1.0.0" >> "$VERSION_FILE"
          fi

  # ============================================
  # STEP 2: Build APK/AAB
  # ============================================
  build:
    needs: validate
    runs-on: ubuntu-latest
    strategy:
      matrix:
        app: [comerciales, instaladores, admin]
    steps:
      - uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: ${{ env.JAVA_VERSION }}

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Generate changelog
        run: |
          chmod +x apps/scripts/changelog_generator.sh
          bash apps/scripts/changelog_generator.sh ${{ matrix.app }}

      - name: Increment version
        run: |
          chmod +x apps/scripts/build.sh
          VERSION_FILE="apps/${{ matrix.app }}/version.properties"
          CURRENT_CODE=$(grep VERSION_CODE "$VERSION_FILE" | cut -d= -f2)
          CURRENT_NAME=$(grep VERSION_NAME "$VERSION_FILE" | cut -d= -f2)
          NEW_CODE=$((CURRENT_CODE + 1))
          IFS='.' read -r MAJOR MINOR PATCH <<< "$CURRENT_NAME"
          PATCH=$((PATCH + 1))
          echo "VERSION_CODE=$NEW_CODE" > "$VERSION_FILE"
          echo "VERSION_NAME=$MAJOR.$MINOR.$PATCH" >> "$VERSION_FILE"
          echo "New version: $MAJOR.$MINOR.$PATCH ($NEW_CODE)"

      - name: Decode keystore
        if: github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/')
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
        run: |
          echo "$KEYSTORE_BASE64" | base64 -d > apps/${{ matrix.app }}/release.keystore

      - name: Build AAB
        env:
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: manoprotect-${{ matrix.app }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: |
          cd apps/${{ matrix.app }}
          if [ -f "gradlew" ]; then
            chmod +x gradlew
            ./gradlew bundleRelease
          else
            echo "NOTE: No gradlew found. AAB build skipped (setup Gradle wrapper)."
          fi

      - name: Upload AAB artifact
        uses: actions/upload-artifact@v4
        with:
          name: aab-${{ matrix.app }}
          path: |
            apps/${{ matrix.app }}/build/outputs/bundle/release/*.aab
            apps/${{ matrix.app }}/version.properties
            apps/logs/changelog_${{ matrix.app }}_latest.txt

  # ============================================
  # STEP 3: Deploy to Play Store
  # ============================================
  deploy:
    needs: build
    if: github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    strategy:
      matrix:
        app: [comerciales, instaladores, admin]
    steps:
      - uses: actions/checkout@v4

      - name: Download AAB
        uses: actions/download-artifact@v4
        with:
          name: aab-${{ matrix.app }}

      - name: Deploy to Play Store
        uses: r0adkll/upload-google-play@v1
        with:
          serviceAccountJsonPlainText: ${{ secrets.GOOGLE_PLAY_SERVICE_ACCOUNT_JSON }}
          packageName: com.manoprotect.${{ matrix.app }}
          releaseFiles: apps/${{ matrix.app }}/build/outputs/bundle/release/*.aab
          track: ${{ github.event.inputs.track || 'internal' }}
          whatsNewDirectory: apps/logs/
          status: completed

      - name: Notify backend of new version
        env:
          ADMIN_TOKEN: ${{ secrets.MANOPROTECT_ADMIN_TOKEN }}
        run: |
          VERSION_NAME=$(grep VERSION_NAME "apps/${{ matrix.app }}/version.properties" | cut -d= -f2)
          VERSION_CODE=$(grep VERSION_CODE "apps/${{ matrix.app }}/version.properties" | cut -d= -f2)
          CHANGELOG=$(cat "apps/logs/changelog_${{ matrix.app }}_latest.txt" 2>/dev/null || echo "Actualización $VERSION_NAME")
          
          curl -s -X PUT "${{ env.API_BASE_URL }}/gestion/app-versions/${{ matrix.app }}" \
            -H "Authorization: Bearer $ADMIN_TOKEN" \
            -H "Content-Type: application/json" \
            -d "{\"version_name\":\"$VERSION_NAME\",\"version_code\":$VERSION_CODE,\"release_notes\":\"$CHANGELOG\"}"

  # ============================================
  # STEP 4: Rollback on failure
  # ============================================
  rollback:
    needs: deploy
    if: failure()
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Execute rollback
        run: |
          echo "Deploy failed! Initiating rollback..."
          chmod +x apps/scripts/rollback.sh
          for app in comerciales instaladores admin; do
            bash apps/scripts/rollback.sh $app || echo "Rollback skipped for $app"
          done

      - name: Notify failure
        run: |
          echo "::error::Deploy failed. Rollback executed. Check logs for details."

  # ============================================
  # STEP 5: Status report
  # ============================================
  report:
    needs: [deploy]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Generate status report
        run: |
          echo "# ManoProtect Apps Deploy Report" > report.md
          echo "Date: $(date)" >> report.md
          echo "Trigger: ${{ github.event_name }}" >> report.md
          echo "Ref: ${{ github.ref }}" >> report.md
          echo "" >> report.md
          echo "## Results" >> report.md
          echo "| App | Status |" >> report.md
          echo "|-----|--------|" >> report.md
          echo "| comerciales | ${{ needs.deploy.result }} |" >> report.md
          echo "| instaladores | ${{ needs.deploy.result }} |" >> report.md
          echo "| admin | ${{ needs.deploy.result }} |" >> report.md
          cat report.md
