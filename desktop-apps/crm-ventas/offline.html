<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>ManoProtect - Reconectando</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #0a0e1a; color: #e2e8f0; font-family: 'Segoe UI', sans-serif; display: flex; align-items: center; justify-content: center; min-height: 100vh; }
    .container { text-align: center; max-width: 480px; padding: 40px; }
    .icon { width: 80px; height: 80px; border-radius: 20px; background: linear-gradient(135deg, #1e293b, #334155); display: flex; align-items: center; justify-content: center; margin: 0 auto 24px; font-size: 36px; animation: pulse 2s ease-in-out infinite; }
    @keyframes pulse { 0%, 100% { transform: scale(1); opacity: 0.8; } 50% { transform: scale(1.05); opacity: 1; } }
    h1 { font-size: 22px; font-weight: 700; margin-bottom: 8px; color: #f59e0b; }
    p { color: #94a3b8; font-size: 14px; line-height: 1.6; margin-bottom: 20px; }
    .status { background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.06); border-radius: 12px; padding: 16px; margin-bottom: 24px; }
    .status-dot { display: inline-block; width: 8px; height: 8px; border-radius: 50%; margin-right: 8px; animation: blink 1.5s infinite; }
    .status-dot.trying { background: #f59e0b; }
    .status-dot.failed { background: #ef4444; animation: none; }
    @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0.3; } }
    #status-text { font-size: 13px; color: #94a3b8; }
    #attempt-count { color: #64748b; font-size: 11px; margin-top: 8px; }
    .btn { display: inline-block; padding: 12px 32px; border-radius: 10px; border: none; background: linear-gradient(135deg, #3b82f6, #1d4ed8); color: white; font-size: 14px; font-weight: 600; cursor: pointer; margin-top: 8px; }
    .btn:hover { opacity: 0.9; }
    .servers { text-align: left; margin-top: 16px; }
    .server-item { display: flex; align-items: center; gap: 8px; padding: 8px 12px; border-radius: 8px; background: rgba(255,255,255,0.02); margin-bottom: 4px; font-size: 12px; }
    .server-status { width: 6px; height: 6px; border-radius: 50%; flex-shrink: 0; }
    .server-status.checking { background: #f59e0b; animation: blink 1s infinite; }
    .server-status.ok { background: #10b981; }
    .server-status.fail { background: #ef4444; }
    .footer { margin-top: 32px; color: #334155; font-size: 11px; }
  </style>
</head>
<body>
  <div class="container">
    <div class="icon">&#128274;</div>
    <h1>Conectando con ManoProtect</h1>
    <p>Buscando servidor disponible. La conexion se restablecera automaticamente.</p>
    <div class="status">
      <div><span class="status-dot trying" id="status-dot"></span><span id="status-text">Intentando reconectar...</span></div>
      <div id="attempt-count"></div>
    </div>
    <div class="servers" id="servers"></div>
    <button class="btn" onclick="tryReconnect()">Reintentar Ahora</button>
    <div class="footer">ManoProtect - Central de Seguridad</div>
  </div>
  <script>
    const URLS = [
      'https://www.manoprotectt.com',
      'https://manoprotectt.com'
    ];
    let attempts = 0;
    let checking = false;

    function renderServers(results) {
      const el = document.getElementById('servers');
      el.innerHTML = results.map(r => `
        <div class="server-item">
          <span class="server-status ${r.status}"></span>
          <span style="color:${r.status === 'ok' ? '#10b981' : r.status === 'fail' ? '#64748b' : '#f59e0b'}">${r.url}</span>
          <span style="margin-left:auto;color:#475569;font-size:10px">${r.label}</span>
        </div>
      `).join('');
    }

    async function testServer(url) {
      try {
        const controller = new AbortController();
        const timeout = setTimeout(() => controller.abort(), 4000);
        const r = await fetch(url + '/api/health', { signal: controller.signal, mode: 'no-cors' });
        clearTimeout(timeout);
        return true;
      } catch (e) { return false; }
    }

    async function tryReconnect() {
      if (checking) return;
      checking = true;
      attempts++;
      document.getElementById('status-dot').className = 'status-dot trying';
      document.getElementById('status-text').textContent = 'Buscando servidor...';
      document.getElementById('attempt-count').textContent = `Intento ${attempts}`;

      const results = URLS.map(u => ({ url: u, status: 'checking', label: 'verificando...' }));
      renderServers(results);

      for (let i = 0; i < URLS.length; i++) {
        const ok = await testServer(URLS[i]);
        results[i].status = ok ? 'ok' : 'fail';
        results[i].label = ok ? 'conectado' : 'no disponible';
        renderServers(results);
        if (ok) {
          document.getElementById('status-text').textContent = 'Servidor encontrado. Cargando...';
          document.getElementById('status-dot').className = 'status-dot trying';
          // Electron will handle the actual navigation via main.js reconnect
          // But also try window.location as fallback
          setTimeout(() => { window.location.href = URLS[i] + '/gestion'; }, 1000);
          checking = false;
          return;
        }
      }

      document.getElementById('status-dot').className = 'status-dot failed';
      document.getElementById('status-text').textContent = 'Servidores no disponibles. Reintentando en 5s...';
      checking = false;
      setTimeout(tryReconnect, 5000);
    }

    // Start auto-reconnect
    setTimeout(tryReconnect, 2000);
  </script>
</body>
</html>
