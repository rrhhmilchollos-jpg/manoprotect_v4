<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>ManoProtect CRM - Sin Conexion</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #0f172a; color: #e2e8f0; display: flex; align-items: center; justify-content: center; height: 100vh; }
    .container { text-align: center; max-width: 480px; padding: 40px; }
    .icon { font-size: 64px; margin-bottom: 24px; }
    h1 { font-size: 24px; margin-bottom: 12px; color: #f8fafc; }
    p { font-size: 14px; color: #94a3b8; line-height: 1.6; margin-bottom: 24px; }
    button { background: #10b981; color: white; border: none; padding: 12px 32px; border-radius: 8px; font-size: 14px; cursor: pointer; font-weight: 600; }
    button:hover { background: #059669; }
  </style>
</head>
<body>
  <div class="container">
    <div class="icon">&#128274;</div>
    <h1>Sin Conexion</h1>
    <p>No se puede conectar con el servidor de ManoProtect. Verifica tu conexion a internet e intentalo de nuevo.</p>
    <button onclick="location.reload()">Reintentar Conexion</button>
  </div>
</body>
</html>
