<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>ManoProtect CRA - Reconectando</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #0f172a; color: #e2e8f0; display: flex; align-items: center; justify-content: center; height: 100vh; }
    .container { text-align: center; max-width: 480px; padding: 40px; }
    .icon { font-size: 64px; margin-bottom: 24px; animation: pulse 2s infinite; }
    @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }
    h1 { font-size: 24px; margin-bottom: 12px; color: #ef4444; }
    p { font-size: 14px; color: #94a3b8; line-height: 1.6; margin-bottom: 24px; }
    .warning { background: #7f1d1d; border: 1px solid #dc2626; padding: 16px; border-radius: 8px; margin-bottom: 24px; color: #fca5a5; font-size: 13px; }
    .status { font-size: 13px; color: #64748b; margin-top: 16px; }
    .retry-count { color: #f59e0b; font-weight: bold; }
    button { background: #dc2626; color: white; border: none; padding: 12px 32px; border-radius: 8px; font-size: 14px; cursor: pointer; font-weight: 600; }
    button:hover { background: #b91c1c; }
  </style>
</head>
<body>
  <div class="container">
    <div class="icon">&#128680;</div>
    <h1>CRA Sin Conexion</h1>
    <div class="warning">ATENCION: La Central Receptora de Alarmas no esta conectada. Las alertas no se estan monitorizando.</div>
    <p>Verifica tu conexion a internet y la disponibilidad del servidor manoprotectt.com. Reintentando automaticamente...</p>
    <button onclick="location.reload()">Reintentar Conexion</button>
    <p class="status">Reintento automatico en <span class="retry-count" id="countdown">10</span>s</p>
  </div>
  <script>
    let seconds = 10;
    const el = document.getElementById('countdown');
    setInterval(() => {
      seconds--;
      if (el) el.textContent = seconds;
      if (seconds <= 0) location.reload();
    }, 1000);
  </script>
</body>
</html>
