name: Build ManoProtect TWA - Android AAB

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - 'manoprotect-twa/**'

jobs:
  build-twa-aab:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup Java 17
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '17'

    - name: Make Gradlew executable
      run: chmod +x manoprotect-twa/gradlew

    - name: Build Android App Bundle (Release)
      working-directory: manoprotect-twa
      run: ./gradlew bundleRelease --no-daemon --stacktrace

    - name: Verify AAB was created
      run: |
        AAB_PATH="manoprotect-twa/app/build/outputs/bundle/release/app-release.aab"
        if [ -f "$AAB_PATH" ]; then
          echo "AAB generated successfully!"
          ls -lh "$AAB_PATH"
        else
          echo "ERROR: AAB not found"
          find manoprotect-twa -name "*.aab" -type f 2>/dev/null || echo "No AAB files found"
          exit 1
        fi

    - name: Upload AAB artifact
      uses: actions/upload-artifact@v4
      with:
        name: ManoProtect-TWA-v2.1.0-release
        path: manoprotect-twa/app/build/outputs/bundle/release/app-release.aab
        if-no-files-found: error
        retention-days: 30
