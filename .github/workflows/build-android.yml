name: Build Android AAB

on:
  workflow_dispatch:  # Permite ejecutar manualmente
  push:
    branches: [ main, master ]

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout código
      uses: actions/checkout@v4

    - name: Configurar Java 17
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '17'

    - name: Configurar Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '18'
        cache: 'yarn'
        cache-dependency-path: mobile-app/yarn.lock

    - name: Instalar dependencias
      working-directory: mobile-app
      run: yarn install --frozen-lockfile

    - name: Configurar Android SDK
      uses: android-actions/setup-android@v3

    - name: Crear keystore desde secreto
      working-directory: mobile-app/android/app
      run: |
        echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 -d > manoprotect-2025.keystore

    - name: Configurar gradle.properties
      working-directory: mobile-app/android
      run: |
        echo "" >> gradle.properties
        echo "MYAPP_UPLOAD_STORE_FILE=manoprotect-2025.keystore" >> gradle.properties
        echo "MYAPP_UPLOAD_KEY_ALIAS=${{ secrets.KEY_ALIAS }}" >> gradle.properties
        echo "MYAPP_UPLOAD_STORE_PASSWORD=${{ secrets.KEYSTORE_PASSWORD }}" >> gradle.properties
        echo "MYAPP_UPLOAD_KEY_PASSWORD=${{ secrets.KEY_PASSWORD }}" >> gradle.properties

    - name: Dar permisos a gradlew
      working-directory: mobile-app/android
      run: chmod +x gradlew

    - name: Compilar AAB Release
      working-directory: mobile-app/android
      run: ./gradlew bundleRelease --no-daemon

    - name: Subir AAB como artefacto
      uses: actions/upload-artifact@v4
      with:
        name: ManoProtect-release-aab
        path: mobile-app/android/app/build/outputs/bundle/release/app-release.aab
        retention-days: 30

    - name: Mostrar ubicación del AAB
      run: |
        echo "✅ AAB generado exitosamente!"
        echo "📁 Ubicación: mobile-app/android/app/build/outputs/bundle/release/app-release.aab"
        ls -la mobile-app/android/app/build/outputs/bundle/release/
