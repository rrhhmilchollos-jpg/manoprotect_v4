name: Build Android AAB - ManoProtect

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - 'mobile-app/**'

jobs:
  build-aab:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup Java 17
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '17'

    - name: Setup Node.js 18
      uses: actions/setup-node@v4
      with:
        node-version: '18'

    - name: Install JS dependencies
      working-directory: mobile-app
      run: yarn install

    - name: Verify gesture-handler version
      working-directory: mobile-app
      run: |
        echo "react-native-gesture-handler version:"
        node -e "console.log(require('react-native-gesture-handler/package.json').version)"
        echo "Must be 2.14.x for RN 0.73 compatibility"

    - name: Create assets directory
      run: mkdir -p mobile-app/android/app/src/main/assets

    - name: Bundle React Native JavaScript
      working-directory: mobile-app
      run: |
        npx react-native bundle \
          --platform android \
          --dev false \
          --entry-file index.js \
          --bundle-output android/app/src/main/assets/index.android.bundle \
          --assets-dest android/app/src/main/res/

    - name: Remove duplicate resources
      working-directory: mobile-app
      run: |
        find android/app/src/main/res/drawable-* -name "node_modules*" -delete 2>/dev/null || true
        find android/app/src/main/res -name "*.orig" -delete 2>/dev/null || true

    - name: Make Gradlew executable
      run: chmod +x mobile-app/android/gradlew

    - name: Build Android App Bundle (Release)
      working-directory: mobile-app/android
      shell: bash
      run: |
        set -o pipefail
        ./gradlew bundleRelease --no-daemon --stacktrace 2>&1 | tee /tmp/build_output.log
      env:
        JAVA_HOME: ${{ env.JAVA_HOME }}

    - name: Show build errors if failed
      if: failure()
      run: |
        echo "=== KOTLIN COMPILATION ERRORS ==="
        grep "^e:" /tmp/build_output.log || echo "No e: lines found"
        echo ""
        echo "=== LAST 50 LINES ==="
        tail -50 /tmp/build_output.log

    - name: Verify AAB
      run: |
        AAB_PATH="mobile-app/android/app/build/outputs/bundle/release/app-release.aab"
        if [ -f "$AAB_PATH" ]; then
          echo "AAB generated successfully!"
          ls -lh "$AAB_PATH"
        else
          echo "AAB not found at expected path"
          find mobile-app/android -name "*.aab" -type f
          exit 1
        fi

    - name: Upload AAB artifact
      uses: actions/upload-artifact@v4
      with:
        name: ManoProtect-v2.0.1-release
        path: mobile-app/android/app/build/outputs/bundle/release/app-release.aab
        if-no-files-found: error
        retention-days: 30
