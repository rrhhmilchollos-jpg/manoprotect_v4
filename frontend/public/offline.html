<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MANO - Sin Conexión</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
      background: linear-gradient(135deg, #18181b 0%, #27272a 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      color: white;
      padding: 20px;
    }
    
    .container {
      text-align: center;
      max-width: 400px;
    }
    
    .icon {
      width: 80px;
      height: 80px;
      margin-bottom: 24px;
      opacity: 0.8;
    }
    
    h1 {
      font-size: 24px;
      margin-bottom: 12px;
      color: #f4f4f5;
    }
    
    p {
      color: #a1a1aa;
      margin-bottom: 24px;
      line-height: 1.6;
    }
    
    .btn {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 12px 24px;
      background: #4f46e5;
      color: white;
      border: none;
      border-radius: 8px;
      font-size: 16px;
      cursor: pointer;
      transition: background 0.2s;
    }
    
    .btn:hover {
      background: #4338ca;
    }
    
    .status {
      margin-top: 32px;
      padding: 16px;
      background: rgba(255, 255, 255, 0.05);
      border-radius: 8px;
      font-size: 14px;
    }
    
    .status-dot {
      display: inline-block;
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: #ef4444;
      margin-right: 8px;
      animation: pulse 2s infinite;
    }
    
    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.5; }
    }
    
    .features {
      margin-top: 32px;
      text-align: left;
    }
    
    .features h3 {
      font-size: 14px;
      color: #71717a;
      margin-bottom: 12px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }
    
    .feature-list {
      list-style: none;
    }
    
    .feature-list li {
      padding: 8px 0;
      color: #a1a1aa;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    
    .check {
      color: #22c55e;
    }
  </style>
</head>
<body>
  <div class="container">
    <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
      <path d="M1 1l22 22M16.72 11.06A10.94 10.94 0 0 1 19 12.55M5 12.55a10.94 10.94 0 0 1 5.17-2.39M10.71 5.05A16 16 0 0 1 22.58 9M1.42 9a15.91 15.91 0 0 1 4.7-2.88M8.53 16.11a6 6 0 0 1 6.95 0M12 20h.01"/>
    </svg>
    
    <h1>Sin conexión a internet</h1>
    <p>
      Parece que no tienes conexión a internet. Algunas funciones de MANO no están disponibles en modo offline.
    </p>
    
    <button class="btn" onclick="window.location.reload()">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <path d="M23 4v6h-6M1 20v-6h6M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"/>
      </svg>
      Reintentar conexión
    </button>
    
    <div class="status">
      <span class="status-dot"></span>
      Esperando conexión...
    </div>
    
    <div class="features">
      <h3>Disponible offline:</h3>
      <ul class="feature-list">
        <li><span class="check">✓</span> Ver historial de amenazas en caché</li>
        <li><span class="check">✓</span> Consultar guías de seguridad</li>
        <li><span class="check">✓</span> Acceder a contactos de emergencia</li>
      </ul>
    </div>
  </div>
  
  <script>
    // Check connection status
    window.addEventListener('online', () => {
      window.location.reload();
    });
  </script>
</body>
</html>
