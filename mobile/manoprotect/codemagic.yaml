workflows:
  android-workflow:
    name: Android Build
    max_build_duration: 60
    environment:
      java: 17
      android_signing:
        - manoprotect_keystore
      groups:
        - google_play
      vars:
        PACKAGE_NAME: "com.manoprotect.app"
    scripts:
      - name: Set up local properties
        script: |
          echo "sdk.dir=$ANDROID_SDK_ROOT" > "$CM_BUILD_DIR/android/local.properties"
      - name: Install dependencies
        script: |
          npm install
      - name: Capacitor sync
        script: |
          npx cap sync android
      - name: Build APK Debug
        script: |
          cd android
          ./gradlew assembleDebug
      - name: Build APK Release
        script: |
          cd android
          ./gradlew assembleRelease
      - name: Build AAB for Play Store
        script: |
          cd android
          ./gradlew bundleRelease
    artifacts:
      - android/app/build/outputs/**/*.apk
      - android/app/build/outputs/**/*.aab
    publishing:
      email:
        recipients:
          - info@manoprotectt.com
        notify:
          success: true
          failure: true
      google_play:
        credentials: $GCLOUD_SERVICE_ACCOUNT_CREDENTIALS
        track: internal
        submit_as_draft: true

  ios-workflow:
    name: iOS Build
    max_build_duration: 60
    integrations:
      app_store_connect: ManoProtect_ASC
    environment:
      ios_signing:
        distribution_type: app_store
        bundle_identifier: com.manoprotect.app
      vars:
        XCODE_WORKSPACE: "ios/App/App.xcworkspace"
        XCODE_SCHEME: "App"
    scripts:
      - name: Install dependencies
        script: |
          npm install
      - name: Add iOS platform
        script: |
          npx cap add ios || true
          npx cap sync ios
      - name: Install CocoaPods
        script: |
          cd ios/App && pod install
      - name: Build iOS
        script: |
          xcode-project build-ipa \
            --workspace "$XCODE_WORKSPACE" \
            --scheme "$XCODE_SCHEME"
    artifacts:
      - build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log
    publishing:
      email:
        recipients:
          - info@manoprotectt.com
      app_store_connect:
        auth: integration
        submit_to_testflight: true
