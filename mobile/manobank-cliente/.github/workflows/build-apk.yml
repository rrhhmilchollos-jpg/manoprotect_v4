name: Build ManoBank APK & iOS

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build-android:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          
      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
          
      - name: Install dependencies
        run: npm ci
        
      - name: Sync Capacitor
        run: npx cap sync android
        
      - name: Make gradlew executable
        run: chmod +x android/gradlew
        
      - name: Build APK
        working-directory: android
        run: ./gradlew assembleDebug
        
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: ManoBank-Android-APK
          path: android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30

  build-ios:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          
      - name: Install dependencies
        run: |
          npm ci
          npm install @capacitor/ios
          
      - name: Add iOS platform
        run: npx cap add ios || true
        
      - name: Sync Capacitor
        run: npx cap sync ios
        
      - name: Build iOS (Simulator)
        working-directory: ios/App
        run: |
          xcodebuild -workspace App.xcworkspace \
            -scheme App \
            -configuration Debug \
            -sdk iphonesimulator \
            -derivedDataPath build \
            CODE_SIGNING_ALLOWED=NO
            
      - name: Create IPA
        run: |
          cd ios/App/build/Build/Products/Debug-iphonesimulator
          mkdir -p Payload
          cp -r App.app Payload/
          zip -r ManoBank.ipa Payload
          
      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: ManoBank-iOS-IPA
          path: ios/App/build/Build/Products/Debug-iphonesimulator/ManoBank.ipa
          retention-days: 30
