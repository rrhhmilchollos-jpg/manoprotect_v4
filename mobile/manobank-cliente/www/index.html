<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#1a1a2e">
    <title>ManoBank - Tu Banca Digital</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body { 
            height: 100%; 
            width: 100%;
            overflow: hidden;
        }
        body { 
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%); 
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            -webkit-font-smoothing: antialiased;
        }
        .splash {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 9999;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            transition: opacity 0.5s ease;
        }
        .splash.hidden { opacity: 0; pointer-events: none; }
        .logo-container {
            text-align: center;
            animation: fadeInUp 0.8s ease;
        }
        .logo {
            font-size: 52px;
            font-weight: 800;
            letter-spacing: -2px;
            background: linear-gradient(135deg, #6366f1 0%, #8b5cf6 50%, #a855f7 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 8px;
        }
        .tagline {
            color: rgba(255,255,255,0.6);
            font-size: 14px;
            font-weight: 500;
            letter-spacing: 2px;
            text-transform: uppercase;
        }
        .loader {
            margin-top: 40px;
            display: flex;
            gap: 8px;
        }
        .loader span {
            width: 10px;
            height: 10px;
            background: #6366f1;
            border-radius: 50%;
            animation: bounce 1.4s ease-in-out infinite;
        }
        .loader span:nth-child(2) { animation-delay: 0.16s; }
        .loader span:nth-child(3) { animation-delay: 0.32s; }
        @keyframes bounce {
            0%, 80%, 100% { transform: scale(0.8); opacity: 0.5; }
            40% { transform: scale(1.2); opacity: 1; }
        }
        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .version {
            position: absolute;
            bottom: 40px;
            color: rgba(255,255,255,0.3);
            font-size: 12px;
        }
        /* Safe area for iOS notch */
        @supports (padding-top: env(safe-area-inset-top)) {
            body { 
                padding-top: env(safe-area-inset-top);
                padding-bottom: env(safe-area-inset-bottom);
            }
        }
    </style>
</head>
<body>
    <div class="splash" id="splash">
        <div class="logo-container">
            <div class="logo">ManoBank</div>
            <div class="tagline">Tu Banca Digital</div>
        </div>
        <div class="loader">
            <span></span>
            <span></span>
            <span></span>
        </div>
        <div class="version">v2.0.0 - Compliance Edition</div>
    </div>
    
    <script>
        // Capacitor integration
        document.addEventListener('DOMContentLoaded', function() {
            // Hide splash after a moment
            setTimeout(function() {
                document.getElementById('splash').classList.add('hidden');
                // Redirect to main app
                setTimeout(function() {
                    window.location.href = "https://familyplan-fix.preview.emergentagent.com";
                }, 500);
            }, 2000);
        });

        // Handle back button on Android
        document.addEventListener('backbutton', function(e) {
            if (window.history.length > 1) {
                window.history.back();
            } else {
                if (confirm('¿Salir de ManoBank?')) {
                    navigator.app && navigator.app.exitApp();
                }
            }
        }, false);
    </script>
</body>
</html>
