<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ManoProtect - Acceso Empleados</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Segoe UI', system-ui, sans-serif;
    }

    body {
      background: transparent;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      -webkit-app-region: drag;
    }

    .login-container {
      background: linear-gradient(145deg, #1a1a2e 0%, #16213e 100%);
      border-radius: 24px;
      padding: 48px;
      width: 420px;
      box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
      border: 1px solid rgba(255, 255, 255, 0.1);
      -webkit-app-region: no-drag;
    }

    .close-btn {
      position: absolute;
      top: 16px;
      right: 16px;
      width: 32px;
      height: 32px;
      border: none;
      background: rgba(255, 255, 255, 0.1);
      border-radius: 50%;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.2s;
      -webkit-app-region: no-drag;
    }

    .close-btn:hover {
      background: #ef4444;
    }

    .close-btn svg {
      width: 16px;
      height: 16px;
      stroke: white;
    }

    .logo {
      text-align: center;
      margin-bottom: 32px;
    }

    .logo-icon {
      width: 80px;
      height: 80px;
      background: linear-gradient(135deg, #10b981 0%, #059669 100%);
      border-radius: 20px;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 16px;
      box-shadow: 0 10px 30px rgba(16, 185, 129, 0.3);
    }

    .logo-icon svg {
      width: 48px;
      height: 48px;
      stroke: white;
      fill: none;
      stroke-width: 2;
    }

    .logo h1 {
      color: white;
      font-size: 28px;
      font-weight: 700;
    }

    .logo p {
      color: #94a3b8;
      font-size: 14px;
      margin-top: 4px;
    }

    .badge {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      background: rgba(16, 185, 129, 0.2);
      border: 1px solid rgba(16, 185, 129, 0.3);
      color: #10b981;
      padding: 6px 12px;
      border-radius: 20px;
      font-size: 12px;
      font-weight: 500;
      margin-top: 16px;
    }

    .badge::before {
      content: '';
      width: 6px;
      height: 6px;
      background: #10b981;
      border-radius: 50%;
      animation: pulse 2s infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.5; }
    }

    .form-group {
      margin-bottom: 24px;
    }

    .form-group label {
      display: block;
      color: #94a3b8;
      font-size: 14px;
      margin-bottom: 8px;
      font-weight: 500;
    }

    .input-wrapper {
      position: relative;
    }

    .input-wrapper svg {
      position: absolute;
      left: 16px;
      top: 50%;
      transform: translateY(-50%);
      width: 20px;
      height: 20px;
      stroke: #64748b;
    }

    .form-group input {
      width: 100%;
      padding: 16px 16px 16px 48px;
      background: rgba(255, 255, 255, 0.05);
      border: 2px solid rgba(255, 255, 255, 0.1);
      border-radius: 12px;
      color: white;
      font-size: 18px;
      letter-spacing: 8px;
      text-align: center;
      transition: all 0.2s;
    }

    .form-group input:focus {
      outline: none;
      border-color: #10b981;
      background: rgba(16, 185, 129, 0.1);
    }

    .form-group input::placeholder {
      letter-spacing: 2px;
      color: #64748b;
    }

    .submit-btn {
      width: 100%;
      padding: 16px;
      background: linear-gradient(135deg, #10b981 0%, #059669 100%);
      border: none;
      border-radius: 12px;
      color: white;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
    }

    .submit-btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 10px 30px rgba(16, 185, 129, 0.3);
    }

    .submit-btn:active {
      transform: translateY(0);
    }

    .submit-btn svg {
      width: 20px;
      height: 20px;
      stroke: white;
    }

    .error-message {
      background: rgba(239, 68, 68, 0.2);
      border: 1px solid rgba(239, 68, 68, 0.3);
      color: #ef4444;
      padding: 12px;
      border-radius: 8px;
      font-size: 14px;
      margin-bottom: 16px;
      display: none;
      align-items: center;
      gap: 8px;
    }

    .error-message.show {
      display: flex;
    }

    .footer {
      text-align: center;
      margin-top: 24px;
      color: #64748b;
      font-size: 12px;
    }

    .footer a {
      color: #10b981;
      text-decoration: none;
    }

    .loading {
      display: none;
    }

    .loading.show {
      display: block;
    }

    .spinner {
      width: 20px;
      height: 20px;
      border: 2px solid rgba(255, 255, 255, 0.3);
      border-top-color: white;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }
  </style>
</head>
<body>
  <div class="login-container">
    <button class="close-btn" onclick="window.close()">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor">
        <path d="M18 6L6 18M6 6l12 12" stroke-width="2" stroke-linecap="round"/>
      </svg>
    </button>

    <div class="logo">
      <div class="logo-icon">
        <svg viewBox="0 0 24 24">
          <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/>
        </svg>
      </div>
      <h1>ManoProtect</h1>
      <p>Portal de Empleados</p>
      <div class="badge">Sistema de Gestión Interno</div>
    </div>

    <form id="loginForm">
      <div id="errorMessage" class="error-message">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <circle cx="12" cy="12" r="10"/>
          <path d="M12 8v4M12 16h.01"/>
        </svg>
        <span id="errorText">Clave de acceso incorrecta</span>
      </div>

      <div class="form-group">
        <label>Clave de Acceso de Empleado</label>
        <div class="input-wrapper">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <rect x="3" y="11" width="18" height="11" rx="2" ry="2"/>
            <path d="M7 11V7a5 5 0 0110 0v4"/>
          </svg>
          <input 
            type="password" 
            id="accessKey" 
            placeholder="••••••••" 
            maxlength="20"
            autocomplete="off"
            required
          >
        </div>
      </div>

      <button type="submit" class="submit-btn" id="submitBtn">
        <span class="btn-text">Acceder al Portal</span>
        <div class="loading">
          <div class="spinner"></div>
        </div>
        <svg class="btn-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M5 12h14M12 5l7 7-7 7"/>
        </svg>
      </button>
    </form>

    <div class="footer">
      <p>STARTBOOKING SL - ManoProtect &copy; 2025</p>
      <p style="margin-top: 4px;">
        <a href="#" onclick="window.electronAPI.openExternal('https://manoprotect.com')">manoprotect.com</a>
      </p>
    </div>
  </div>

  <script>
    const form = document.getElementById('loginForm');
    const accessKeyInput = document.getElementById('accessKey');
    const errorMessage = document.getElementById('errorMessage');
    const errorText = document.getElementById('errorText');
    const submitBtn = document.getElementById('submitBtn');

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      
      const key = accessKeyInput.value.trim();
      
      if (!key) {
        showError('Introduce la clave de acceso');
        return;
      }

      // Show loading
      submitBtn.disabled = true;
      submitBtn.querySelector('.btn-text').style.display = 'none';
      submitBtn.querySelector('.btn-icon').style.display = 'none';
      submitBtn.querySelector('.loading').classList.add('show');

      try {
        const result = await window.electronAPI.verifyAccessKey(key);
        
        if (result.success) {
          // Success - notify main process
          window.electronAPI.loginSuccess();
        } else {
          showError(result.message);
          accessKeyInput.value = '';
          accessKeyInput.focus();
        }
      } catch (error) {
        showError('Error de conexión');
      } finally {
        // Reset button
        submitBtn.disabled = false;
        submitBtn.querySelector('.btn-text').style.display = 'inline';
        submitBtn.querySelector('.btn-icon').style.display = 'inline';
        submitBtn.querySelector('.loading').classList.remove('show');
      }
    });

    function showError(message) {
      errorText.textContent = message;
      errorMessage.classList.add('show');
      setTimeout(() => {
        errorMessage.classList.remove('show');
      }, 3000);
    }

    // Focus input on load
    accessKeyInput.focus();
  </script>
</body>
</html>
