<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ManoProtect - Acceso Empleados</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
    }

    body {
      background: transparent;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      -webkit-app-region: drag;
    }

    .login-container {
      background: linear-gradient(145deg, #0f172a 0%, #1e293b 100%);
      border-radius: 24px;
      padding: 48px;
      width: 420px;
      box-shadow: 0 25px 60px -12px rgba(0, 0, 0, 0.6);
      border: 1px solid rgba(255, 255, 255, 0.1);
      -webkit-app-region: no-drag;
      position: relative;
    }

    .close-btn {
      position: absolute;
      top: 16px;
      right: 16px;
      width: 32px;
      height: 32px;
      border: none;
      background: rgba(255, 255, 255, 0.1);
      border-radius: 50%;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.2s;
      -webkit-app-region: no-drag;
    }

    .close-btn:hover {
      background: #ef4444;
    }

    .close-btn svg {
      width: 16px;
      height: 16px;
      stroke: white;
    }

    .logo {
      text-align: center;
      margin-bottom: 32px;
    }

    .logo-icon {
      width: 100px;
      height: 100px;
      margin: 0 auto 20px;
    }

    .logo-icon img {
      width: 100%;
      height: 100%;
      border-radius: 24px;
      box-shadow: 0 10px 40px rgba(16, 185, 129, 0.3);
    }

    .logo h1 {
      color: white;
      font-size: 32px;
      font-weight: 700;
      background: linear-gradient(135deg, #10b981, #3b82f6);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .logo p {
      color: #94a3b8;
      font-size: 14px;
      margin-top: 8px;
    }

    .badge {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: rgba(16, 185, 129, 0.15);
      border: 1px solid rgba(16, 185, 129, 0.3);
      color: #10b981;
      padding: 8px 16px;
      border-radius: 24px;
      font-size: 13px;
      font-weight: 500;
      margin-top: 16px;
    }

    .badge::before {
      content: '';
      width: 8px;
      height: 8px;
      background: #10b981;
      border-radius: 50%;
      animation: pulse 2s infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; transform: scale(1); }
      50% { opacity: 0.5; transform: scale(0.8); }
    }

    .form-group {
      margin-bottom: 24px;
    }

    .form-group label {
      display: block;
      color: #94a3b8;
      font-size: 14px;
      margin-bottom: 10px;
      font-weight: 500;
    }

    .input-wrapper {
      position: relative;
    }

    .input-wrapper svg {
      position: absolute;
      left: 18px;
      top: 50%;
      transform: translateY(-50%);
      width: 22px;
      height: 22px;
      stroke: #64748b;
    }

    .form-group input {
      width: 100%;
      padding: 18px 18px 18px 54px;
      background: rgba(255, 255, 255, 0.05);
      border: 2px solid rgba(255, 255, 255, 0.1);
      border-radius: 14px;
      color: white;
      font-size: 20px;
      letter-spacing: 10px;
      text-align: center;
      transition: all 0.2s;
    }

    .form-group input:focus {
      outline: none;
      border-color: #10b981;
      background: rgba(16, 185, 129, 0.1);
      box-shadow: 0 0 0 4px rgba(16, 185, 129, 0.1);
    }

    .form-group input::placeholder {
      letter-spacing: 4px;
      color: #475569;
    }

    .submit-btn {
      width: 100%;
      padding: 18px;
      background: linear-gradient(135deg, #10b981 0%, #059669 100%);
      border: none;
      border-radius: 14px;
      color: white;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
    }

    .submit-btn:hover {
      transform: translateY(-3px);
      box-shadow: 0 15px 40px rgba(16, 185, 129, 0.4);
    }

    .submit-btn:active {
      transform: translateY(-1px);
    }

    .submit-btn svg {
      width: 22px;
      height: 22px;
      stroke: white;
    }

    .error-message {
      background: rgba(239, 68, 68, 0.15);
      border: 1px solid rgba(239, 68, 68, 0.3);
      color: #f87171;
      padding: 14px;
      border-radius: 10px;
      font-size: 14px;
      margin-bottom: 20px;
      display: none;
      align-items: center;
      gap: 10px;
    }

    .error-message.show {
      display: flex;
    }

    .footer {
      text-align: center;
      margin-top: 28px;
      color: #64748b;
      font-size: 12px;
    }

    .footer p {
      margin-bottom: 4px;
    }

    .footer a {
      color: #10b981;
      text-decoration: none;
      transition: color 0.2s;
    }

    .footer a:hover {
      color: #34d399;
    }

    .spinner {
      width: 22px;
      height: 22px;
      border: 3px solid rgba(255, 255, 255, 0.3);
      border-top-color: white;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    .features {
      display: flex;
      justify-content: center;
      gap: 20px;
      margin-top: 24px;
      padding-top: 24px;
      border-top: 1px solid rgba(255, 255, 255, 0.1);
    }

    .feature {
      text-align: center;
      color: #64748b;
      font-size: 11px;
    }

    .feature svg {
      width: 20px;
      height: 20px;
      stroke: #10b981;
      margin-bottom: 4px;
    }
  </style>
</head>
<body>
  <div class="login-container">
    <button class="close-btn" onclick="window.close()">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor">
        <path d="M18 6L6 18M6 6l12 12" stroke-width="2" stroke-linecap="round"/>
      </svg>
    </button>

    <div class="logo">
      <div class="logo-icon">
        <img src="https://static.prod-images.emergentagent.com/jobs/1efd8821-9402-4a99-87f0-f789bfce818b/images/b43816538bca69163a474728ab52ed519fdf941650bad92c7afbaee239aa619c.png" alt="ManoProtect Logo">
      </div>
      <h1>ManoProtect</h1>
      <p>Portal de Empleados</p>
      <div class="badge">Sistema de Gestión Interno</div>
    </div>

    <form id="loginForm">
      <div id="errorMessage" class="error-message">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <circle cx="12" cy="12" r="10"/>
          <path d="M12 8v4M12 16h.01"/>
        </svg>
        <span id="errorText">Clave de acceso incorrecta</span>
      </div>

      <div class="form-group">
        <label>Clave de Acceso</label>
        <div class="input-wrapper">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <rect x="3" y="11" width="18" height="11" rx="2" ry="2"/>
            <path d="M7 11V7a5 5 0 0110 0v4"/>
          </svg>
          <input 
            type="password" 
            id="accessKey" 
            placeholder="••••••••" 
            maxlength="20"
            autocomplete="off"
            required
          >
        </div>
      </div>

      <button type="submit" class="submit-btn" id="submitBtn">
        <span class="btn-text">Acceder</span>
        <svg class="btn-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M5 12h14M12 5l7 7-7 7"/>
        </svg>
      </button>
    </form>

    <div class="features">
      <div class="feature">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/>
        </svg>
        <p>Seguro</p>
      </div>
      <div class="feature">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <circle cx="12" cy="12" r="10"/>
          <path d="M12 6v6l4 2"/>
        </svg>
        <p>Tiempo Real</p>
      </div>
      <div class="feature">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <rect x="2" y="3" width="20" height="14" rx="2"/>
          <path d="M8 21h8M12 17v4"/>
        </svg>
        <p>Multiplataforma</p>
      </div>
    </div>

    <div class="footer">
      <p>STARTBOOKING SL &copy; 2025</p>
      <p><a href="#" onclick="event.preventDefault()">manoprotect.com</a></p>
    </div>
  </div>

  <script>
    const form = document.getElementById('loginForm');
    const accessKeyInput = document.getElementById('accessKey');
    const errorMessage = document.getElementById('errorMessage');
    const errorText = document.getElementById('errorText');
    const submitBtn = document.getElementById('submitBtn');
    const btnText = submitBtn.querySelector('.btn-text');
    const btnIcon = submitBtn.querySelector('.btn-icon');

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      
      const key = accessKeyInput.value.trim();
      
      if (!key) {
        showError('Introduce la clave de acceso');
        return;
      }

      // Show loading
      submitBtn.disabled = true;
      btnText.textContent = 'Verificando...';
      btnIcon.style.display = 'none';

      try {
        const result = await window.electronAPI.verifyAccessKey(key);
        
        if (result.success) {
          btnText.textContent = '¡Acceso concedido!';
          submitBtn.style.background = 'linear-gradient(135deg, #059669, #047857)';
          
          setTimeout(() => {
            window.electronAPI.loginSuccess();
          }, 500);
        } else {
          showError(result.message);
          accessKeyInput.value = '';
          accessKeyInput.focus();
          resetButton();
        }
      } catch (error) {
        showError('Error de conexión');
        resetButton();
      }
    });

    function showError(message) {
      errorText.textContent = message;
      errorMessage.classList.add('show');
      accessKeyInput.style.borderColor = '#ef4444';
      
      setTimeout(() => {
        errorMessage.classList.remove('show');
        accessKeyInput.style.borderColor = '';
      }, 3000);
    }

    function resetButton() {
      submitBtn.disabled = false;
      btnText.textContent = 'Acceder';
      btnIcon.style.display = 'inline';
      submitBtn.style.background = '';
    }

    // Focus input on load
    setTimeout(() => accessKeyInput.focus(), 100);
  </script>
</body>
</html>
